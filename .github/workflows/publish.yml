name: Publish Package to GitHub Packages

on:
  push:
    tags:
      - 'v*' # Trigger on any tag matching 'v*', e.g., 'v1.0.0'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write # Necessary for publishing to GitHub Packages

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Setup Node.js 18
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          registry-url: 'https://npm.pkg.github.com'
          scope: '@lkeld'

      - name: Setup Rust
        uses: actions-rust-lang/setup-rust-toolchain@v1
        with:
          toolchain: stable

      - name: Install wasm-pack
        uses: jetli/wasm-pack-action@v0.4.0
        with:
          version: 'latest'

      - name: Install Node Dependencies
        run: npm ci

      - name: Run Tests
        run: npm test

      - name: Build Fortress WASM Pipeline
        # Randomizes the ISA, builds TS compiler, TS server scrambler, and the wasm bundles
        run: npm run build

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
