name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install npm dependencies
        run: npm ci

      - name: Run lockfile validation
        run: npm ci --ignore-scripts

      - name: Check for vulnerabilities
        run: npm audit --audit-level=high

      - name: Install cargo-audit
        run: cargo install cargo-audit --locked

      - name: Run cargo audit check
        run: cargo audit

      - name: Install cargo-deny
        run: cargo install cargo-deny --locked

      - name: Run cargo-deny checks
        run: cargo deny check

      - name: Run Tests
        run: npm test

      - name: Build Fortress WASM Pipeline
        run: npm run build
        env:
          FORTRESS_SIGNING_PASSWORD: ${{ secrets.FORTRESS_SIGNING_PASSWORD }}

      - name: Generate WASM Integrity Hashes
        run: node -e "const crypto = require('crypto'); const fs = require('fs'); const hash = crypto.createHash('sha384').update(fs.readFileSync('pkg-web/vm_core_bg.wasm')).digest('hex'); fs.mkdirSync('dist', { recursive: true }); fs.writeFileSync('WASM_INTEGRITY.txt', hash); fs.writeFileSync('dist/WASM_INTEGRITY.txt', hash);"

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Browser Tests
        run: npm run test:browser

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
