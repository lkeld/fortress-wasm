name: Publish to GitHub Packages

on:
  push:
    tags:
      - 'v*'

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    env:
      FORTRESS_SIGNING_PASSWORD: ${{ secrets.FORTRESS_SIGNING_PASSWORD }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20.x'
          registry-url: 'https://npm.pkg.github.com'
          cache: 'npm'

      - name: Setup Rust Toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust dependencies
        uses: Swatinem/rust-cache@23bce251a8cd2ffc3c1075eaa2367cf899916d84

      - name: Install wasm-pack
        run: curl https://rustwasm.github.io/wasm-pack/installer/init.sh -sSf | sh

      - name: Install npm dependencies
        run: npm ci

      - name: Run lockfile validation
        run: npm ci --ignore-scripts

      - name: Check for vulnerabilities
        run: npm audit --audit-level=high

      - name: Install cargo-audit
        uses: taiki-e/install-action@d8c10dae823f48238abff23fee4146b448aed2f1
        with:
          tool: cargo-audit

      - name: Run cargo audit check
        run: cargo audit

      - name: Run cargo-deny checks
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979

      - name: Run Tests
        run: npm test

      - name: Build Fortress WASM Pipeline
        run: npm run build

      - name: Generate WASM Integrity Hashes
        run: |
          node -e "const crypto = require('crypto'); const fs = require('fs'); const hash = crypto.createHash('sha384').update(fs.readFileSync('pkg-web/vm_core_bg.wasm')).digest('hex'); fs.mkdirSync('dist', { recursive: true }); fs.writeFileSync('WASM_INTEGRITY.txt', hash); fs.writeFileSync('dist/WASM_INTEGRITY.txt', hash);"

      - name: Install Playwright Chromium
        run: npx playwright install chromium --with-deps

      - name: Run Browser Tests
        run: npm run test:browser

      - name: Publish to GitHub Packages
        run: npm publish
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
